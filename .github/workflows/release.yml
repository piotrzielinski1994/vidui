name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true
        default: v0.1.0
      releaseName:
        description: 'Release title (defaults to the tag)'
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin,universal-apple-darwin' || '' }}

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch ffmpeg sidecars (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: |
          scripts/fetch-ffmpeg.sh aarch64-apple-darwin
          scripts/fetch-ffmpeg.sh x86_64-apple-darwin
          lipo -create \
            src-tauri/binaries/ffmpeg-aarch64-apple-darwin \
            src-tauri/binaries/ffmpeg-x86_64-apple-darwin \
            -output src-tauri/binaries/ffmpeg-universal-apple-darwin
          lipo -create \
            src-tauri/binaries/ffprobe-aarch64-apple-darwin \
            src-tauri/binaries/ffprobe-x86_64-apple-darwin \
            -output src-tauri/binaries/ffprobe-universal-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-universal-apple-darwin src-tauri/binaries/ffprobe-universal-apple-darwin

      - name: Fetch ffmpeg sidecars (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: scripts/fetch-ffmpeg.sh x86_64-pc-windows-msvc

      - name: Fetch ffmpeg sidecars (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: scripts/fetch-ffmpeg.sh x86_64-unknown-linux-gnu

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag }}
          releaseName: ${{ github.event.inputs.releaseName || github.event.inputs.tag }}
          releaseBody: 'Download the installer for your OS. Unsigned: on macOS right-click the app and choose Open; on Windows choose "More info -> Run anyway".'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
